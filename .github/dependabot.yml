version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      # Bundle Radix UI bumps into one PR — they version in lock-step.
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Bundle type-only @types/* bumps; they almost never need separate review.
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
