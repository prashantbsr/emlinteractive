name: Feature request
description: Suggest a new feature, a new EML decomposition, a knowledge-base article, or an improvement to an existing one.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! See [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md) for the areas where help is most useful.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve, or what would it let a learner do that they can't do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How you'd see it working. UI sketch, API shape, or — for a new EML decomposition — the proposed tree and its K-value.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why this one is preferable.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Links to the paper section, prior work, references, related issues.
    validations:
      required: false
