name: Bug report
description: Something is wrong in the app, the EML engine, or a published decomposition.
title: "bug: <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can — minimal reproductions get fixed fastest.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A one- or two-sentence description of the bug.
      placeholder: "Calculator returns the wrong value for sqrt(2)."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps, inputs, or an EML expression. If it's a calculator bug, include the keys pressed.
      placeholder: |
        1. Open /playground
        2. Enter `eml(1, eml(1, 1))`
        3. Observe result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to see, and (if relevant) the JavaScript `Math` reference value.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What you actually saw. Paste the rendered tree or trace if relevant.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser + OS, or Node version if it's an engine-level bug.
      placeholder: "Chrome 131 / macOS 14"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, console errors, links to the deployed page, etc.
    validations:
      required: false
